services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fura}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-fura}
    volumes:
      - db_data:/var/lib/postgresql/data
    # Bound to localhost only — Postgres is NOT exposed to the internet.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fura}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fura}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-fura}?schema=public
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env}
      AUTH_TRUST_HOST: "true"
      NODE_ENV: production
    # Runs migrations, then starts the server.
    command: sh -c "npx prisma migrate deploy && node server.js"
    ports:
      - "127.0.0.1:3000:3000"

  # Reverse proxy with automatic HTTPS. Point your domain's DNS at this VPS,
  # set DOMAIN + ACME_EMAIL in .env, then `docker compose up -d caddy`.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL in .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  db_data:
  caddy_data:
  caddy_config:
